server:
  port: 8080

spring:
  application:
    name: jobhuntly-backend
  
  datasource:
    url: jdbc:mysql://localhost:3310/jobhuntly?createDatabaseIfNotExist=true&serverTimezone=UTC&useSSL=false&allowPublicKeyRetrieval=true
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: root
    password: root
  
  jpa:
    database-platform: org.hibernate.dialect.MySQLDialect
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

jwt:
  secret: jobhuntly-secret-key-for-jwt-token-generation-and-validation-2024
  access-token-expiration: 259200000  # 3 days in milliseconds
  refresh-token-expiration: 604800000 # 7 days in milliseconds

cors:
  allowed-origins: http://localhost:5173,http://localhost:3000
  allowed-methods: GET,POST,PUT,DELETE,OPTIONS
  allowed-headers: "*"
  allow-credentials: true
